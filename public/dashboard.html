<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track My Cash — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .insight-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 18px;
      animation: fadeSlideUp 400ms var(--ease-out) 240ms both;
    }
    .insight-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: transform 200ms, box-shadow 200ms;
    }
    .insight-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .insight-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .insight-label { font-size: 10.5px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
    .insight-val { font-size: 19px; font-weight: 800; letter-spacing: -0.4px; }

    .dash-grid { display: grid; grid-template-columns: 3fr 2fr; gap: 18px; margin-bottom: 18px; }

    .chart-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-xl);
      padding: 22px;
      animation: fadeSlideUp 400ms var(--ease-out) 300ms both;
    }
    .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .chart-title { font-size: 12px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
    .chart-legend { display: flex; gap: 14px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--text-secondary); font-weight: 500; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    .doughnut-wrap { position: relative; max-height: 200px; display: flex; align-items: center; justify-content: center; }
    .doughnut-center { position: absolute; text-align: center; pointer-events: none; }
    .doughnut-center-label { font-size: 10px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .doughnut-center-value { font-size: 14px; font-weight: 800; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; margin-top: 3px; }

    .cat-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border-subtle); font-size: 12.5px; }
    .cat-row:last-child { border-bottom: none; }
    .cat-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .cat-name { flex: 1; font-weight: 500; color: var(--text-primary); }
    .cat-amount { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--text-secondary); }
    .cat-pct { font-size: 10.5px; color: var(--text-tertiary); width: 36px; text-align: right; }

    .recent-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-xl);
      overflow: hidden;
      animation: fadeSlideUp 400ms var(--ease-out) 360ms both;
    }
    .recent-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--border-subtle); }
    .recent-header h3 { font-size: 14px; font-weight: 700; letter-spacing: -0.2px; }

    .tx-row { display: flex; align-items: center; padding: 13px 22px; border-bottom: 1px solid var(--border-subtle); gap: 14px; transition: background 120ms; }
    .tx-row:last-child { border-bottom: none; }
    .tx-row:hover { background: var(--bg-hover); }
    .tx-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .tx-icon.income  { background: rgba(0,212,168,0.1); color: var(--green); }
    .tx-icon.expense { background: var(--red-dim); color: var(--red); }
    .tx-info { flex: 1; min-width: 0; }
    .tx-name { font-size: 13.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-meta { font-size: 11.5px; color: var(--text-secondary); margin-top: 2px; }
    .tx-amount { font-family: 'JetBrains Mono', monospace; font-size: 13.5px; font-weight: 600; white-space: nowrap; }
    .tx-amount.income  { color: var(--green); }
    .tx-amount.expense { color: var(--red); }

    .year-select {
      background: var(--bg-overlay); border: 1px solid var(--border-default);
      border-radius: var(--radius-md); padding: 8px 12px;
      color: var(--text-secondary); font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12.5px; font-weight: 500; cursor: pointer;
    }
    .year-select:focus { outline: none; border-color: var(--accent); }
    .year-select option { background: var(--bg-elevated); }

    .skeleton {
      background: linear-gradient(90deg, var(--bg-overlay) 25%, var(--bg-hover) 50%, var(--bg-overlay) 75%);
      background-size: 200% 100%;
      animation: skeletonPulse 1.4s ease-in-out infinite;
      border-radius: 6px;
    }
    @keyframes skeletonPulse {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>

<main class="main">

  <!-- Header -->
  <div class="page-header">
    <div>
      <h1 id="greeting-text">Dashboard</h1>
      <p id="date-label"></p>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <select class="year-select" id="yearFilter" onchange="loadAll()">
        <option value="">All Time</option>
      </select>
      <a href="transaction.html" class="btn btn-primary">
        <i class="fas fa-plus"></i> Add Transaction
      </a>
    </div>
  </div>

  <!-- Stat Cards -->
  <div class="stat-grid">
    <div class="stat-card green">
      <div class="stat-icon"><i class="fas fa-wallet"></i></div>
      <div class="stat-label">Net Balance</div>
      <div class="stat-value green" id="s-balance">—</div>
      <div style="margin-top:10px;font-size:11px;color:var(--text-secondary)">Income minus all expenses</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-icon"><i class="fas fa-arrow-down"></i></div>
      <div class="stat-label">Total Income</div>
      <div class="stat-value" id="s-income">—</div>
      <div style="margin-top:10px;font-size:11px;color:var(--text-secondary)">All income recorded</div>
    </div>
    <div class="stat-card red">
      <div class="stat-icon"><i class="fas fa-arrow-up"></i></div>
      <div class="stat-label">Total Expenses</div>
      <div class="stat-value red" id="s-expense">—</div>
      <div style="margin-top:10px;font-size:11px;color:var(--text-secondary)">All spending recorded</div>
    </div>
  </div>

  <!-- Quick Insights -->
  <div class="insight-strip" id="insight-strip">
    <div class="insight-card">
      <div class="insight-icon skeleton" style="width:40px;height:40px;border-radius:10px"></div>
      <div style="flex:1"><div class="skeleton" style="height:10px;width:55%;margin-bottom:8px"></div><div class="skeleton" style="height:18px;width:38%"></div></div>
    </div>
    <div class="insight-card">
      <div class="insight-icon skeleton" style="width:40px;height:40px;border-radius:10px"></div>
      <div style="flex:1"><div class="skeleton" style="height:10px;width:55%;margin-bottom:8px"></div><div class="skeleton" style="height:18px;width:38%"></div></div>
    </div>
    <div class="insight-card">
      <div class="insight-icon skeleton" style="width:40px;height:40px;border-radius:10px"></div>
      <div style="flex:1"><div class="skeleton" style="height:10px;width:55%;margin-bottom:8px"></div><div class="skeleton" style="height:18px;width:38%"></div></div>
    </div>
  </div>

  <!-- Charts -->
  <div class="dash-grid">
    <!-- Bar Chart -->
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">Monthly Income vs Expenses</span>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Income</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> Expenses</div>
        </div>
      </div>
      <canvas id="barChart" style="max-height:240px"></canvas>
    </div>

    <!-- Doughnut -->
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">Expense Breakdown</span>
      </div>
      <div class="doughnut-wrap">
        <canvas id="doughnutChart" style="max-height:190px"></canvas>
        <div class="doughnut-center">
          <div class="doughnut-center-label">Spent</div>
          <div class="doughnut-center-value" id="doughnut-total">—</div>
        </div>
      </div>
      <div id="cat-legend" style="margin-top:16px"></div>
    </div>
  </div>

  <!-- Recent Transactions -->
  <div class="recent-card">
    <div class="recent-header">
      <h3>Recent Transactions</h3>
      <a href="transaction.html" class="btn btn-ghost btn-sm">View All <i class="fas fa-chevron-right" style="font-size:10px"></i></a>
    </div>
    <div id="recent-list"></div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="shared.js"></script>
<script>
  renderSidebar('dashboard.html');

  const hr = new Date().getHours();
  document.getElementById('greeting-text').textContent =
    (hr < 5 ? 'Late night 🌙' : hr < 12 ? 'Good morning ☀️' : hr < 17 ? 'Good afternoon 👋' : 'Good evening 🌆');
  document.getElementById('date-label').textContent =
    new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  // Year filter
  const curYear = new Date().getFullYear();
  const sel = document.getElementById('yearFilter');
  for (let y = curYear; y >= curYear - 4; y--)
    sel.innerHTML += `<option value="${y}">${y}</option>`;

  const PALETTE = ['#00d4a8', '#4f8ef7', '#ffc046', '#ff5c7a', '#a78bfa', '#ec4899', '#14b8a6', '#f97316'];

  const tooltipDefaults = {
    backgroundColor: '#1a2235',
    borderColor: 'rgba(255,255,255,0.09)',
    borderWidth: 1,
    titleColor: '#f0f4ff',
    bodyColor: '#8892a8',
    padding: 12,
    cornerRadius: 10,
    callbacks: { label: ctx => ` LKR ${(+ctx.raw || 0).toLocaleString('en-US', { minimumFractionDigits: 2 })}` }
  };

  let barChart, doughnutChart;

  async function loadAll() {
    const year = document.getElementById('yearFilter').value;
    const qs = year ? `?year=${year}` : '';

    const [report, monthly, cats, txs] = await Promise.all([
      fetch('/get-report-data' + qs).then(r => r.json()).catch(() => ({})),
      fetch('/income-vs-expenses' + qs).then(r => r.json()).catch(() => []),
      fetch('/expense-categories' + qs).then(r => r.json()).catch(() => []),
      fetch('/get-transactions?limit=8').then(r => r.json()).catch(() => [])
    ]);

    // Stats
    document.getElementById('s-balance').textContent = fmt(report.budgetLeft);
    document.getElementById('s-income').textContent  = fmt(report.totalIncome);
    document.getElementById('s-expense').textContent = fmt(report.totalExpense);

    // Insights
    const sr = report.totalIncome > 0 ? ((report.budgetLeft / report.totalIncome) * 100).toFixed(1) : '0.0';
    const srColor = +sr > 20 ? 'var(--green)' : +sr > 0 ? 'var(--yellow)' : 'var(--red)';
    const topCat = cats[0]?.category || 'None';

    document.getElementById('insight-strip').innerHTML = `
      <div class="insight-card">
        <div class="insight-icon" style="background:rgba(0,212,168,0.1);color:var(--green)"><i class="fas fa-piggy-bank"></i></div>
        <div><div class="insight-label">Savings Rate</div><div class="insight-val" style="color:${srColor}">${sr}%</div></div>
      </div>
      <div class="insight-card">
        <div class="insight-icon" style="background:var(--blue-dim);color:var(--blue)"><i class="fas fa-receipt"></i></div>
        <div><div class="insight-label">Transactions</div><div class="insight-val" style="color:var(--blue)">${txs.length}</div></div>
      </div>
      <div class="insight-card">
        <div class="insight-icon" style="background:var(--yellow-dim);color:var(--yellow)"><i class="fas fa-fire"></i></div>
        <div><div class="insight-label">Top Expense</div><div class="insight-val" style="color:var(--yellow);font-size:15px;font-family:'Plus Jakarta Sans',sans-serif">${topCat}</div></div>
      </div>
    `;

    // Bar chart
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const incArr = new Array(12).fill(0), expArr = new Array(12).fill(0);
    monthly.forEach(e => { incArr[e.month-1] = +e.income; expArr[e.month-1] = +e.expense; });

    if (barChart) barChart.destroy();
    barChart = new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: {
        labels: months,
        datasets: [
          { label: 'Income', data: incArr, backgroundColor: 'rgba(0,212,168,0.65)', hoverBackgroundColor: 'rgba(0,212,168,0.9)', borderRadius: 5, borderSkipped: false },
          { label: 'Expenses', data: expArr, backgroundColor: 'rgba(255,92,122,0.65)', hoverBackgroundColor: 'rgba(255,92,122,0.9)', borderRadius: 5, borderSkipped: false }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: tooltipDefaults },
        scales: {
          x: { ticks: { color: '#4a5568', font: { size: 11, family: 'Plus Jakarta Sans' } }, grid: { color: 'rgba(255,255,255,0.03)', drawBorder: false }, border: { display: false } },
          y: { ticks: { color: '#4a5568', font: { size: 10, family: 'JetBrains Mono' }, callback: v => v.toLocaleString() }, grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false }, border: { display: false }, beginAtZero: true }
        }
      }
    });

    // Doughnut
    if (doughnutChart) doughnutChart.destroy();
    const totalSpend = cats.reduce((s, c) => s + +c.total, 0);
    document.getElementById('doughnut-total').textContent = totalSpend > 0 ? fmt(totalSpend) : '—';

    if (cats.length > 0) {
      doughnutChart = new Chart(document.getElementById('doughnutChart'), {
        type: 'doughnut',
        data: {
          labels: cats.map(c => c.category),
          datasets: [{ data: cats.map(c => +c.total), backgroundColor: PALETTE.slice(0, cats.length), borderColor: '#111827', borderWidth: 2, hoverBorderWidth: 0, hoverOffset: 5 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          cutout: '70%',
          plugins: {
            legend: { display: false },
            tooltip: {
              ...tooltipDefaults,
              callbacks: { label: ctx => { const p = ((ctx.raw / totalSpend) * 100).toFixed(1); return ` ${fmt(ctx.raw)}  (${p}%)`; } }
            }
          }
        }
      });

      document.getElementById('cat-legend').innerHTML = cats.slice(0, 5).map((c, i) => {
        const pct = ((+c.total / totalSpend) * 100).toFixed(1);
        return `<div class="cat-row">
          <div class="cat-dot" style="background:${PALETTE[i]}"></div>
          <div class="cat-name">${c.category}</div>
          <div class="cat-amount">${fmt(c.total)}</div>
          <div class="cat-pct">${pct}%</div>
        </div>`;
      }).join('');
    } else {
      document.getElementById('cat-legend').innerHTML = `<p style="text-align:center;color:var(--text-tertiary);font-size:12px;padding:20px 0">No expense data yet</p>`;
    }

    // Recent transactions
    const list = document.getElementById('recent-list');
    if (!txs.length) {
      list.innerHTML = `<div class="empty-state"><i class="fas fa-receipt"></i><strong>No transactions yet</strong><p>Add your first transaction to see it here</p></div>`;
    } else {
      list.innerHTML = txs.slice(0, 8).map(t => {
        const type = (t.type || '').toLowerCase();
        const sign = type === 'income' ? '+' : '−';
        const dateStr = t.date ? new Date(t.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
        return `<div class="tx-row">
          <div class="tx-icon ${type}"><i class="fas ${type === 'income' ? 'fa-arrow-down' : 'fa-arrow-up'}"></i></div>
          <div class="tx-info">
            <div class="tx-name">${t.name}</div>
            <div class="tx-meta">${t.description || ''} · ${dateStr}</div>
          </div>
          <div class="tx-amount ${type}">${sign} ${fmt(t.price)}</div>
        </div>`;
      }).join('');
    }
  }

  loadAll();
</script>
</body>
</html>
